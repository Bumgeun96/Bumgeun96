name: Update AI Usage

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

concurrency:
  group: update-ai-usage
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render AI stats
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import re
          import urllib.parse
          import urllib.request

          key = os.environ["WAKATIME_API_KEY"]
          auth = base64.b64encode(key.encode()).decode()
          headers = {"Authorization": f"Basic {auth}"}

          def get_json(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)["data"]

          def duration(seconds):
              minutes = int(round(float(seconds or 0))) // 60
              return f"{minutes // 60}h {minutes % 60:02d}m"

          # Codex/Claude의 AI 생성 코드 변경량·세션 수
          stats = get_json(
              "https://api.wakatime.com/api/v1/users/current/stats/all_time"
          )

          def agent_lines(name):
              return sum(
                  int(value or 0)
                  for agent, value in stats.get(
                      "ai_agent_line_changes", {}
                  ).items()
                  if name in agent.casefold()
              )

          # WakaTime에 기록된 실제 ChatGPT 프로젝트 이름 찾기
          projects = get_json(
              "https://api.wakatime.com/api/v1/users/current/projects"
          )

          chatgpt_project = next(
              (
                  project.get("name")
                  for project in projects
                  if "chatgpt" in project.get("name", "").casefold()
              ),
              None,
          )

          # 해당 프로젝트의 전체 누적 시간 조회
          chatgpt_time = 0
          if chatgpt_project:
              query = urllib.parse.urlencode(
                  {"project": chatgpt_project}
              )
              chatgpt_stats = get_json(
                  "https://api.wakatime.com/api/v1/users/current/"
                  "all_time_since_today?"
                  + query
              )
              chatgpt_time = chatgpt_stats.get("total_seconds", 0)
              print(
                  f"ChatGPT project found: {chatgpt_project} "
                  f"({chatgpt_time} seconds)"
              )
          else:
              print("ChatGPT project was not found in WakaTime projects.")

          codex = agent_lines("codex")
          claude = agent_lines("claude")
          total = int(stats.get("ai_line_changes_total", 0))
          sessions = int(stats.get("ai_sessions", 0))

          block = f"""### 📊 AI tool use — all time

          | Tool | Metric |
          | --- | ---: |
          | ChatGPT (web) | {duration(chatgpt_time)} active time |
          | Codex | {codex:,} AI-generated lines changed |
          | Claude | {claude:,} AI-generated lines changed |

          _Total AI coding: {total:,} lines changed · {sessions:,} sessions._
          """

          path = "README.md"
          text = open(path, encoding="utf-8").read()

          start = "<!-- AI_STATS:START -->"
          end = "<!-- AI_STATS:END -->"

          text = re.sub(
              re.escape(start) + r".*?" + re.escape(end),
              f"{start}\n{block}\n{end}",
              text,
              flags=re.S,
          )

          open(path, "w", encoding="utf-8").write(text)
          PY

      - name: Commit README if changed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update AI usage stats"
          git pull --rebase origin main
          git push origin HEAD:main
