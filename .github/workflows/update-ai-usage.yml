name: Update AI Usage

on:
  workflow_dispatch:
  schedule:
    - cron: "17 1 * * *"

concurrency:
  group: update-ai-usage
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render AI stats
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          python - <<'PY'
          import base64
          import http.client
          import json
          import os
          import re
          import textwrap
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import date, timedelta

          key = os.environ["WAKATIME_API_KEY"]
          auth = base64.b64encode(key.encode()).decode()
          headers = {"Authorization": f"Basic {auth}"}

          def get_json(url):
              for attempt in range(3):
                  try:
                      request = urllib.request.Request(url, headers=headers)

                      with urllib.request.urlopen(
                          request,
                          timeout=30,
                      ) as response:
                          payload = json.load(response)

                      if "data" not in payload:
                          raise RuntimeError(
                              f"Unexpected WakaTime response: {payload}"
                          )

                      return payload["data"]

                  except (
                      http.client.RemoteDisconnected,
                      urllib.error.URLError,
                  ) as error:
                      if attempt == 2:
                          raise error

                      time.sleep(2 * (attempt + 1))

          def duration(seconds):
              minutes = int(round(float(seconds or 0))) // 60
              return f"{minutes // 60}h {minutes % 60:02d}m"

          def tokens(value):
              value = int(value or 0)

              if value >= 1_000_000:
                  return f"{value / 1_000_000:.1f}M"

              if value >= 1_000:
                  return f"{value / 1_000:.1f}K"

              return f"{value:,}"

          # 가장 오래된 WakaTime 프로젝트 생성일을 찾습니다.
          projects = get_json(
              "https://api.wakatime.com/api/v1/users/current/projects"
          )

          project_dates = [
              project.get("created_at", "")[:10]
              for project in projects
              if project.get("created_at")
          ]

          start_date = (
              date.fromisoformat(min(project_dates))
              if project_dates
              else date(2020, 1, 1)
          )

          today = date.today()
          cursor = start_date

          chatgpt_seconds = 0
          chatgpt_input_tokens = 0
          chatgpt_output_tokens = 0

          ai_coding_input_tokens = 0
          ai_coding_output_tokens = 0

          # WakaTime이 긴 기간 요청을 끊는 경우가 있어,
          # 전체 누적 기간을 31일씩 나누어 합산합니다.
          while cursor <= today:
              end_date = min(
                  cursor + timedelta(days=30),
                  today,
              )

              query = urllib.parse.urlencode(
                  {
                      "start": cursor.isoformat(),
                      "end": end_date.isoformat(),
                  }
              )

              summaries = get_json(
                  "https://api.wakatime.com/api/v1/users/current/"
                  "summaries?"
                  + query
              )

              for day in summaries:
                  for project in day.get("projects", []):
                      name = project.get("name", "")
                      total_seconds = project.get(
                          "total_seconds",
                          0,
                      )
                      input_tokens = project.get(
                          "ai_input_tokens",
                          0,
                      )
                      output_tokens = project.get(
                          "ai_output_tokens",
                          0,
                      )

                      if "chatgpt" in name.casefold():
                          chatgpt_seconds += total_seconds
                          chatgpt_input_tokens += input_tokens
                          chatgpt_output_tokens += output_tokens
                      else:
                          ai_coding_input_tokens += input_tokens
                          ai_coding_output_tokens += output_tokens

              cursor = end_date + timedelta(days=1)

              # WakaTime API 요청 속도를 여유 있게 제한합니다.
              if cursor <= today:
                  time.sleep(0.3)

          chatgpt_total_tokens = (
              chatgpt_input_tokens + chatgpt_output_tokens
          )

          ai_coding_total_tokens = (
              ai_coding_input_tokens + ai_coding_output_tokens
          )

          total_tokens = (
              chatgpt_total_tokens + ai_coding_total_tokens
          )

          print(
              "Token totals:",
              {
                  "chatgpt": chatgpt_total_tokens,
                  "ai_coding": ai_coding_total_tokens,
                  "total": total_tokens,
              },
          )

          block = textwrap.dedent(
              f"""\
              ### 📊 AI tool use — all time

              | Tool | Metric |
              | --- | ---: |
              | ChatGPT (web) | {duration(chatgpt_seconds)} active time · {tokens(chatgpt_total_tokens)} tokens |
              | AI coding (Codex / Claude) | {tokens(ai_coding_total_tokens)} tokens |
              | Total | {tokens(total_tokens)} tokens |
              """
          ).strip()

          path = "README.md"
          text = open(path, encoding="utf-8").read()

          start = "<!-- AI_STATS:START -->"
          end = "<!-- AI_STATS:END -->"

          if start not in text or end not in text:
              raise RuntimeError(
                  "README.md is missing AI_STATS markers."
              )

          text = re.sub(
              re.escape(start) + r".*?" + re.escape(end),
              f"{start}\n{block}\n{end}",
              text,
              flags=re.S,
          )

          open(path, "w", encoding="utf-8").write(text)
          PY

      - name: Commit README if changed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update AI usage stats"
          git pull --rebase origin main
          git push origin HEAD:main
